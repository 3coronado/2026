<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Match Timer — REBUILT 2026</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0b16">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
/* ─── RESET & DESIGN TOKENS ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b0b16; --surf:#141422; --surf2:#1c1c30; --surf3:#24243c; --surf4:#2e2e4a;
  --gold:#f0a500; --gold-d:rgba(240,165,0,.13);
  --red:#e8534a;  --red-d:rgba(232,83,74,.13);
  --blue:#4a8fe8; --blue-d:rgba(74,143,232,.13);
  --green:#4caf7d; --green-d:rgba(76,175,125,.13);
  --text:#f0f0f8; --text2:#8888aa; --text3:#454567;
  --border:rgba(255,255,255,.07);
  --r:14px; --r-sm:9px; --sh:0 4px 24px rgba(0,0,0,.5);
}
html,body{height:100%;min-height:100vh;min-height:100dvh;min-height:-webkit-fill-available;overflow:hidden}
html{background:var(--surf)}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--surf);color:var(--text);font-size:16px;
  overscroll-behavior:none
}

/* ─── SCREENS ─── */
.screen{position:fixed;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;overflow:hidden;background:var(--surf)}
.screen.active{display:flex}

/* ─── HEADER ─── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
  padding-top:max(14px,env(safe-area-inset-top,14px));
  padding-left:calc(14px + env(safe-area-inset-left,0px));
  padding-right:calc(14px + env(safe-area-inset-right,0px));
  background:var(--surf);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:20;gap:8px
}
.hdr-mid{flex:1;min-width:0;text-align:center}
.hdr-title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}
.hdr-sub{font-size:11px;color:var(--text2);margin-top:2px}
.hdr-btn{
  background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:8px 13px;color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;min-width:62px;text-align:center;
  transition:opacity .15s;font-family:inherit
}
.hdr-btn:active{opacity:.65}
.hdr-btn.gold{background:var(--gold);color:#000;border-color:var(--gold)}
.hdr-btn.red-btn{background:var(--red);color:#fff;border-color:var(--red)}

/* ─── PROGRESS BAR ─── */
.prog{display:flex;gap:5px;padding:9px calc(14px + env(safe-area-inset-right,0px)) 9px calc(14px + env(safe-area-inset-left,0px));background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0}
.prog-pip{flex:1;height:3px;background:var(--surf4);border-radius:2px;transition:background .3s}
.prog-pip.on{background:var(--gold)}

/* ─── SCROLL AREA ─── */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;padding:14px calc(14px + env(safe-area-inset-right,0px)) 100px calc(14px + env(safe-area-inset-left,0px))}

/* ─── BOTTOM TABS ─── */
.tabs{
  display:flex;background:var(--surf);border-top:1px solid var(--border);
  padding-left:calc(env(safe-area-inset-left,0px));
  padding-right:calc(env(safe-area-inset-right,0px));
  flex-shrink:0
}
/* Safe-area padding lives inside the button — no separate chin strip */
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px calc(10px + env(safe-area-inset-bottom,12px));gap:4px;border:none;background:none;
  color:var(--text3);font-size:10px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;cursor:pointer;transition:color .2s;font-family:inherit
}
.tab.on{color:var(--gold)}
.tab svg{width:21px;height:21px;stroke-width:2}

/* ─── CARD ─── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-hd{font-size:10px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
/* Required field validation */
.req-err{box-shadow:0 0 0 2px var(--red)!important;transition:box-shadow .15s}
.req-err .card-hd{color:var(--red)!important}
@keyframes reqShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.req-shake{animation:reqShake .35s ease}

/* ─── COUNTER ─── */
.ctr{margin-bottom:10px}
.ctr-lbl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.ctr-box{background:var(--surf2);border-radius:var(--r-sm);overflow:hidden}
.ctr-num{
  font-size:48px;font-weight:900;text-align:center;
  padding:10px 0 2px;line-height:1;
  font-variant-numeric:tabular-nums;letter-spacing:-1px;
  transition:transform .07s
}
.ctr-num.pop{transform:scale(1.2)}
/* editable counter input overrides */
input.ctr-num{
  width:100%;display:block;background:transparent;border:none;border-radius:0;
  color:inherit;outline:none;-webkit-appearance:none;appearance:none;
  -moz-appearance:textfield
}
input.ctr-num::-webkit-inner-spin-button,
input.ctr-num::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input.ctr-num:focus{border:none;box-shadow:inset 0 -2px 0 var(--gold)}

/* ─── SLIDER INPUT ─── */
.ctr-btns-row{display:flex;gap:1px}
.ctr-slider-wrap{display:none;padding:6px 12px 12px}
body.slider-mode .ctr-btns-row{display:none}
body.slider-mode .ctr-slider-wrap{display:block}
.ctr-slider{
  width:100%;height:44px;cursor:pointer;
  -webkit-appearance:none;appearance:none;background:transparent;
  touch-action:manipulation;display:block
}
.ctr-slider::-webkit-slider-runnable-track{
  height:8px;background:var(--surf4);border-radius:4px
}
.ctr-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:34px;height:34px;border-radius:50%;
  background:var(--gold);margin-top:-13px;box-shadow:0 2px 8px rgba(0,0,0,.5)
}
.ctr-slider::-moz-range-track{height:8px;background:var(--surf4);border-radius:4px}
.ctr-slider::-moz-range-thumb{width:34px;height:34px;border-radius:50%;background:var(--gold);border:none;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.ctr-slider::-ms-track{height:8px;background:var(--surf4);border-radius:4px;color:transparent;border:none}
.ctr-slider::-ms-thumb{width:34px;height:34px;border-radius:50%;background:var(--gold);border:none}
.ctr.foul .ctr-slider::-webkit-slider-thumb{background:var(--red)}
.ctr.foul .ctr-slider::-moz-range-thumb{background:var(--red)}
/* foul counters: always buttons, never slider, ±1 only */
.ctr.foul .ctr-btns-row{display:flex!important}
.ctr.foul .ctr-slider-wrap{display:none!important}

/* ─── TAB BACKGROUND TINTS ─── */
body.tab-auton #sc-match .body{background:rgba(74,143,232,.10)}
body.tab-teleop #sc-match .body{background:rgba(232,83,74,.10)}
body.tab-auton #sc-match .card{border-color:rgba(74,143,232,.24)}
body.tab-teleop #sc-match .card{border-color:rgba(232,83,74,.24)}
body.tab-auton #sc-match .hdr{border-bottom-color:rgba(74,143,232,.35)}
body.tab-teleop #sc-match .hdr{border-bottom-color:rgba(232,83,74,.35)}
body.tab-auton #sc-match .tabs{border-top-color:rgba(74,143,232,.35)}
body.tab-teleop #sc-match .tabs{border-top-color:rgba(232,83,74,.35)}
body.tab-auton #sc-match .prog{background:rgba(74,143,232,.09)}
body.tab-teleop #sc-match .prog{background:rgba(232,83,74,.09)}

/* ─── SHOOTER SPEED GRID ─── */
.spd-grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.spd-grid2-b{
  width:100%;padding:11px 10px;background:var(--surf2);border:2px solid var(--border);
  border-radius:var(--r-sm);color:var(--text2);font-size:12px;font-weight:700;
  cursor:pointer;text-align:left;line-height:1.3;transition:all .15s;touch-action:manipulation;
  font-family:inherit
}
.spd-grid2-b.on{border-color:var(--gold);background:var(--gold-d);color:var(--gold)}

/* ─── RATE INLINE ─── */
.rate-inline{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surf3);border-radius:0 0 var(--r-sm) var(--r-sm);margin-top:-1px;margin-bottom:10px}
.rate-bps{font-size:17px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--text);min-width:76px;white-space:nowrap}

/* ─── PIT ARCHETYPE GRID ─── */
.arch-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.arch-b{padding:13px 8px;background:var(--surf2);border:2px solid var(--border);border-radius:var(--r-sm);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;text-align:center;line-height:1.35;transition:all .15s;touch-action:manipulation}
.arch-b.on{border-color:var(--blue);background:var(--blue-d);color:var(--blue)}

/* mode segment */
.mode-seg{display:flex;background:var(--surf3);border-radius:var(--r-sm);padding:3px;gap:3px;margin-bottom:12px}
.mode-seg-b{flex:1;padding:7px 6px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;border-radius:6px;transition:all .15s;text-align:center;font-family:inherit;touch-action:manipulation}
.mode-seg-b.on{background:var(--surf4);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.35)}

/* ─── HOME BANNER ─── */
.home-banner{
  background:linear-gradient(135deg,var(--surf) 0%,rgba(240,165,0,.07) 100%);
  border-bottom:1px solid rgba(240,165,0,.22);
  padding:14px 20px 12px;display:flex;align-items:center;
  justify-content:center;gap:14px;flex-shrink:0;
  padding-top:max(16px,env(safe-area-inset-top,16px));
  padding-left:calc(20px + env(safe-area-inset-left,0px));
  padding-right:calc(20px + env(safe-area-inset-right,0px))
}
.banner-logo{flex-shrink:0}
.banner-title{font-size:19px;font-weight:900;letter-spacing:-.3px;line-height:1.15}
.banner-sub{font-size:11px;color:var(--text2);margin-top:3px;letter-spacing:.3px}

/* ─── INFO SCREEN ─── */
.info-section{margin-bottom:14px}
.info-rule{display:flex;justify-content:space-between;align-items:baseline;
  padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.info-rule:last-child{border-bottom:none}
.info-k{color:var(--text2);font-size:13px}
.info-v{font-weight:800;color:var(--gold)}
.ctr-row{display:flex;gap:1px}
.cb{
  flex:1;border:none;cursor:pointer;font-weight:900;
  font-family:inherit;line-height:1;
  transition:filter .08s;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
.cb:active{filter:brightness(.7)}
.cb-big{font-size:26px;padding:15px 0;background:var(--surf3);color:var(--text2);flex:1.5}
.cb-big.plus{background:var(--gold);color:#000}
.cb-big.plus.p5{background:rgba(240,165,0,.85);color:#000}
.cb-sm{font-size:13px;padding:10px 0;background:var(--surf4);color:var(--text3);flex:0.7}
/* foul variant */
.ctr.foul .ctr-num{color:var(--red)}
.ctr.foul .cb-big.plus{background:var(--red);color:#fff}
.ctr.foul .cb-sm.p5{background:rgba(232,83,74,.2);color:var(--red)}

/* ─── TOGGLE ROW ─── */
.trow{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;
  touch-action:manipulation;
}
.trow:last-child{border-bottom:none}
.trow-lbl{font-size:15px;font-weight:500}
.trow-sub{font-size:12px;color:var(--text2);margin-top:2px}
.tog{
  width:48px;height:27px;background:var(--surf3);border-radius:14px;
  position:relative;transition:background .2s;flex-shrink:0;
}
.tog.on{background:var(--gold)}
.tog.on.red{background:var(--red)}
.tog::after{
  content:'';position:absolute;width:21px;height:21px;
  background:#fff;border-radius:50%;top:3px;left:3px;
  transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.35)
}
.tog.on::after{transform:translateX(21px)}
/* Tri-state Yes/No/IDK */
.trow-tri{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:10px}
.trow-tri:last-child{border-bottom:none}
.tri-seg{display:flex;gap:4px;flex-shrink:0}
.tri-b{padding:6px 10px;border:2px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;min-width:36px;text-align:center}
.tri-b.on{color:#fff}

/* ─── SEGMENT ─── */
.seg{display:flex;background:var(--surf2);border-radius:var(--r-sm);padding:3px;gap:3px}
.seg-b{
  flex:1;padding:9px 3px;border:none;background:transparent;
  color:var(--text2);font-size:12px;font-weight:700;
  cursor:pointer;border-radius:6px;transition:all .15s;
  text-align:center;font-family:inherit;touch-action:manipulation;
}
.seg-b.on{background:var(--surf3);color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.4)}
.seg-b.on.g{background:var(--gold);color:#000}
.seg-b.on.r{background:var(--red);color:#fff}
.seg-b.on.b{background:var(--blue);color:#fff}

/* ─── FORM FIELDS ─── */
.lbl{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
     color:var(--text2);margin-bottom:6px;margin-top:14px;display:block}
.lbl:first-child{margin-top:0}
input,select,textarea{
  width:100%;background:var(--surf2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:12px 14px;
  color:var(--text);font-size:16px;font-family:inherit;
  outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color .15s
}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input.big{font-size:26px;font-weight:800;text-align:center;padding:13px}
textarea{resize:none;min-height:82px;line-height:1.5}
select option{background:var(--surf2)}

/* ─── ALLIANCE PICK ─── */
.ally{display:flex;gap:10px}
.ally-b{
  flex:1;padding:16px 8px;border-radius:var(--r);border:2px solid var(--border);
  cursor:pointer;text-align:center;font-size:16px;font-weight:800;
  background:var(--surf2);color:var(--text2);transition:all .15s;
  touch-action:manipulation;
}
.ally-b:active{transform:scale(.97)}
.ally-b.r.on{border-color:var(--red);background:var(--red-d);color:var(--red)}
.ally-b.b.on{border-color:var(--blue);background:var(--blue-d);color:var(--blue)}

/* ─── START POSITIONS ─── */
.pos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.pos-b{
  padding:11px 4px;background:var(--surf2);border:2px solid var(--border);
  border-radius:var(--r-sm);color:var(--text2);font-size:11px;font-weight:700;
  cursor:pointer;text-align:center;line-height:1.38;transition:all .15s;
  touch-action:manipulation;
}
.pos-b.on{border-color:var(--gold);background:var(--gold-d);color:var(--gold)}

/* ─── SPEED GRID ─── */
.spd-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.spd-b{
  padding:10px 4px;background:var(--surf2);border:2px solid var(--border);
  border-radius:var(--r-sm);color:var(--text2);font-size:11px;font-weight:700;
  cursor:pointer;text-align:center;line-height:1.4;transition:all .15s;
  touch-action:manipulation;
}
.spd-b .tier{font-size:15px;font-weight:900;color:var(--text);display:block;margin-bottom:2px}
.spd-b.on{border-color:var(--gold);background:var(--gold-d);color:var(--gold)}
.spd-b.on .tier{color:var(--gold)}

/* ─── CHIPS ─── */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.chip{
  padding:8px 14px;background:var(--surf2);border:2px solid var(--border);
  border-radius:20px;color:var(--text2);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;touch-action:manipulation;
}
.chip.on{border-color:var(--blue);background:var(--blue-d);color:var(--blue)}

/* ─── DRIVETRAIN GRID ─── */
.dt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dt-b{
  padding:14px 8px;background:var(--surf2);border:2px solid var(--border);
  border-radius:var(--r-sm);color:var(--text2);font-size:13px;font-weight:700;
  cursor:pointer;text-align:center;transition:all .15s;touch-action:manipulation;
}
.dt-b.on{border-color:var(--blue);background:var(--blue-d);color:var(--blue)}

/* ─── DATA SUMMARY ─── */
.sum{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:13px}
.sum-k{color:var(--text2);font-weight:500}
.sum-v{font-weight:700;text-align:right}

/* ─── BUTTONS ─── */
.btn{
  width:100%;padding:15px;border:none;border-radius:var(--r);
  font-size:15px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:inherit;letter-spacing:.3px;
  margin-bottom:9px;touch-action:manipulation;
}
.btn:last-child{margin-bottom:0}
.btn:active{transform:scale(.98)}
.btn-gold{background:var(--gold);color:#000}
.btn-surf{background:var(--surf2);color:var(--text);border:1px solid var(--border)}
.btn-blue{background:var(--blue);color:#fff}
.btn-red{background:var(--red);color:#fff}

/* ─── SAVED ITEM ─── */
.si{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 12px;background:var(--surf2);border-radius:var(--r-sm);
  margin-bottom:7px;border:1px solid var(--border)
}
.si-name{font-size:13px;font-weight:700}
.si-sub{font-size:11px;color:var(--text2);margin-top:2px}
.si-del{
  background:var(--red-d);color:var(--red);border:none;border-radius:6px;
  width:30px;height:30px;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:inherit;touch-action:manipulation;
}

/* ─── QR AREA ─── */
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0}
.qr-box{background:#fff;padding:12px;border-radius:var(--r);display:inline-block}
.qr-note{font-size:12px;color:var(--text2);text-align:center;max-width:260px;line-height:1.5}

/* ─── MODAL ─── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.82);
  display:flex;align-items:center;justify-content:center;
  z-index:999;padding:20px
}
.modal-box{
  background:var(--surf);border-radius:var(--r);padding:22px;
  max-width:320px;width:100%;text-align:center;
  border:1px solid var(--border);box-shadow:var(--sh)
}
.modal-title{font-size:11px;font-weight:800;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.modal-qr-inner{background:#fff;padding:12px;border-radius:var(--r-sm);
  display:inline-block;margin-bottom:12px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:84px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--surf3);color:var(--text);
  padding:11px 20px;border-radius:20px;font-size:14px;font-weight:600;
  opacity:0;transition:all .26s;pointer-events:none;z-index:1000;
  white-space:nowrap;border:1px solid var(--border);box-shadow:var(--sh)
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── HOME ─── */
.home-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 calc(14px + env(safe-area-inset-right,0px)) max(20px,env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left,0px))}
.hero{padding:28px 14px 10px;text-align:center}
.hero-icon{font-size:52px;line-height:1;margin-bottom:8px}
.hero-name{font-size:26px;font-weight:900;letter-spacing:-.5px}
.hero-sub{font-size:13px;color:var(--text2);margin-top:4px}
.hcards{display:flex;flex-direction:column;gap:11px;padding:14px}
.hcard{
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;cursor:pointer;
  transition:transform .12s;display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;touch-action:manipulation;
}
.hcard:active{transform:scale(.985)}
.hcard::before{content:'';position:absolute;inset:0;pointer-events:none}
.hcard.gold{border-color:rgba(240,165,0,.25)}
.hcard.gold::before{background:linear-gradient(135deg,rgba(240,165,0,.08) 0%,transparent 55%)}
.hcard.blue{border-color:rgba(74,143,232,.25)}
.hcard.blue::before{background:linear-gradient(135deg,rgba(74,143,232,.08) 0%,transparent 55%)}
.hcard.green{border-color:rgba(76,175,125,.25)}
.hcard.green::before{background:linear-gradient(135deg,rgba(76,175,125,.08) 0%,transparent 55%)}
.hcard-icon{font-size:36px;flex-shrink:0}
.hcard-title{font-size:19px;font-weight:800}
.hcard-desc{font-size:12px;color:var(--text2);margin-top:3px}
.hcard-arr{position:absolute;right:17px;font-size:20px;color:var(--text3)}
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--gold);color:#000;font-size:11px;font-weight:900;
  border-radius:10px;padding:2px 7px;margin-left:7px;min-width:22px
}
.ref-g{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:12px}
.ref-k{color:var(--text2)}
.ref-v{font-weight:700;color:var(--gold);text-align:right}

/* ─── MATCHES SCREEN ─── */
.mtab{flex:1;border:none;background:none;color:var(--text3);font-size:13px;font-weight:700;
  padding:10px 4px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s}
.mtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.mf-btn{border:1px solid var(--border);border-radius:8px;background:var(--surf3);color:var(--text2);
  font-size:13px;font-weight:700;padding:7px 13px;cursor:pointer;font-family:inherit;
  white-space:nowrap;transition:all .15s;flex-shrink:0}
.mf-btn.on{background:rgba(240,165,0,.15);border-color:var(--gold);color:var(--gold)}
.mf-btn.mf-apply{background:var(--gold);color:#000;border-color:var(--gold)}
.mf-btn.mf-apply:active{opacity:.75}
.epill{border:1px solid var(--border);border-radius:20px;background:var(--surf2);color:var(--text2);
  font-size:12px;font-weight:700;padding:6px 13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.epill.on{background:var(--gold);color:#000;border-color:var(--gold)}
.mrow{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
.mrow:last-child{border-bottom:none}
.mrow.gold-row{background:rgba(240,165,0,.06);border-left:3px solid var(--gold);padding-left:11px}
.mrow-num{font-weight:800;color:var(--text2);min-width:58px;font-size:12px}
.mrow-teams{flex:1;min-width:0}
.mrow-ally{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:2px}
.mrow-tm{font-size:12px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--surf3)}
.mrow-tm.gold{background:rgba(240,165,0,.2);color:var(--gold)}
.mrow-score{text-align:right;font-size:13px;font-weight:800;min-width:38px}
.mrow-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:4px}
.mrow-badge.win{background:rgba(76,175,125,.2);color:var(--green)}
.mrow-badge.loss{background:rgba(232,83,74,.15);color:var(--red)}
.mrow-badge.tie{background:rgba(240,165,0,.15);color:var(--gold)}
.mrow-time{font-size:11px;color:var(--text3);text-align:right;min-width:54px}
.rank-row{display:grid;grid-template-columns:32px 60px 1fr 1fr 1fr;gap:6px;
  align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.rank-row.gold-row{background:rgba(240,165,0,.06);border-left:3px solid var(--gold);padding-left:11px}
.rank-row.hd{color:var(--text3);font-size:11px;font-weight:700;padding:7px 14px}
.rank-r{font-weight:900;color:var(--text2);font-size:14px}
.rank-tm{font-weight:800}
.offline-banner{background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.3);
  border-radius:8px;margin:10px 14px;padding:9px 12px;font-size:12px;color:var(--gold);font-weight:600}

/* ─── GOOGLE SHEETS SYNC ─── */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.sync-dot.green{background:var(--green)}
.sync-dot.yellow{background:var(--gold);animation:sdpulse .9s ease-in-out infinite}
.sync-dot.red{background:var(--red);animation:sdpulse .9s ease-in-out infinite}
.sync-dot.off{background:var(--text3)}
@keyframes sdpulse{0%,100%{opacity:1}50%{opacity:.2}}
/* Per-entry sync status pill in history/export */
.sentry-pill{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:5px;flex-shrink:0}
.sentry-pill.synced{background:rgba(76,175,125,.18);color:var(--green)}
.sentry-pill.pending{background:rgba(240,165,0,.14);color:var(--gold)}
.sentry-pill.failed{background:rgba(232,83,74,.14);color:var(--red)}

/* ─── UTILITIES ─── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeUp .18s ease}
.dimmed{opacity:.32;pointer-events:none}

/* ─── LANDSCAPE OPTIMIZATION ─── */
@media (max-height:500px) and (orientation:landscape){
  .hdr{padding-top:5px;padding-bottom:5px;padding-left:calc(12px + env(safe-area-inset-left,0px));padding-right:calc(12px + env(safe-area-inset-right,0px))}
  .hdr-title{font-size:13px}
  .hdr-sub{display:none}
  .prog{padding:5px calc(12px + env(safe-area-inset-right,0px)) 5px calc(12px + env(safe-area-inset-left,0px))}
  .body{padding:9px calc(10px + env(safe-area-inset-right,0px)) 74px calc(10px + env(safe-area-inset-left,0px))}
  .card{padding:11px;margin-bottom:7px}
  .card-hd{margin-bottom:9px;font-size:9px}
  .ctr{margin-bottom:7px}
  .ctr-num{font-size:34px;padding:5px 0 1px}
  .ctr-lbl{font-size:12px;margin-bottom:4px}
  .cb-big{font-size:22px;padding:11px 0}
  .cb-sm{padding:7px 0;font-size:12px}
  .tab{padding:5px 4px calc(5px + env(safe-area-inset-bottom,0px));gap:2px;font-size:8px;letter-spacing:.4px}
  .tab svg{width:17px;height:17px}
  .pos-grid{grid-template-columns:repeat(6,1fr)}
  .spd-grid{grid-template-columns:repeat(6,1fr)}
  .hero{padding:12px calc(14px + env(safe-area-inset-right,0px)) 4px calc(14px + env(safe-area-inset-left,0px))}
  .hero-icon{font-size:32px;margin-bottom:4px}
  .hero-name{font-size:18px}
  .hero-sub{font-size:11px}
  .hcards{gap:7px;padding:8px calc(8px + env(safe-area-inset-right,0px)) 8px calc(8px + env(safe-area-inset-left,0px))}
  .hcard{padding:11px}
  .hcard-title{font-size:15px}
  .hcard-icon{font-size:28px}
  .toast{bottom:58px}
  .home-banner{padding:8px 14px}
  .banner-title{font-size:15px}
  .banner-logo svg{width:34px;height:34px}
  .ctr-num{font-size:34px}
  .ctr-slider{height:36px}
  .ctr-slider::-webkit-slider-thumb{width:28px;height:28px;margin-top:-10px}
  .ctr-slider-wrap{padding:4px 10px 8px}
  .trow{padding:10px 0}
  .trow-lbl{font-size:13px}
  .ally-b{padding:12px 8px;font-size:14px}
  input.big{font-size:22px;padding:10px}
  .btn{padding:12px;font-size:14px}
}

/* ─── SPLASH ─── */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-direction:column}
#splash-geo{position:absolute;inset:0;background-repeat:repeat;opacity:0;clip-path:circle(0% at 50% 50%);-webkit-clip-path:circle(0% at 50% 50%)}
#splash-glow{position:absolute;width:160vmax;height:160vmax;border-radius:50%;background:radial-gradient(circle,rgba(240,165,0,.09) 0%,rgba(240,165,0,.02) 45%,transparent 70%);opacity:0;transform:scale(0.1);pointer-events:none}
#splash-ring{position:absolute;width:160px;height:160px;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.3);border:2px solid var(--gold);border-radius:50%;opacity:0;pointer-events:none;z-index:3}
#splash-center{position:relative;display:flex;flex-direction:column;align-items:center;z-index:2}
#splash-logo-img{height:86px;width:auto;max-width:260px;object-fit:contain;opacity:0;transform:scale(2.5);filter:blur(8px);position:relative;z-index:1;will-change:transform,opacity,filter}
#splash-logo-fb{font-size:80px;line-height:1;display:none;opacity:0;transform:scale(2.5);filter:blur(8px);position:relative;z-index:1;will-change:transform,opacity,filter}
#splash-text{font-size:13px;font-weight:900;letter-spacing:4px;color:var(--gold);text-transform:uppercase;opacity:0;transform:translateY(10px);margin-top:18px;position:relative;z-index:1}

@keyframes splash-fadein{from{opacity:0}to{opacity:1}}
@keyframes splash-geo-reveal{
  0%{clip-path:circle(0% at 50% 50%);-webkit-clip-path:circle(0% at 50% 50%);opacity:0}
  20%{opacity:1}
  100%{clip-path:circle(150% at 50% 50%);-webkit-clip-path:circle(150% at 50% 50%);opacity:1}
}
@keyframes splash-glow-bloom{
  from{opacity:0;transform:scale(0.1)}
  to{opacity:1;transform:scale(1)}
}
@keyframes splash-logo-strike{
  from{opacity:0;transform:scale(2.5);filter:blur(8px) drop-shadow(0 0 0px rgba(240,165,0,0))}
  to{opacity:1;transform:scale(1);filter:blur(0px) drop-shadow(0 0 30px rgba(240,165,0,.45))}
}
@keyframes splash-ring-pulse{
  0%{opacity:.8;transform:translate(-50%,-50%) scale(0.3)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(3.5)}
}
@keyframes splash-text-up{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes splash-logo-fly{
  from{opacity:1;transform:scale(1);filter:blur(0px) drop-shadow(0 0 30px rgba(240,165,0,.45))}
  to{opacity:0;transform:scale(0.3) translateY(-36vh);filter:blur(2px) drop-shadow(0 0 0px transparent)}
}
@keyframes splash-fadeout{
  from{opacity:1}
  to{opacity:0;pointer-events:none}
}

/* ─── MATCH TIMER ─── */
.tmr-clock{font-size:60px;font-weight:900;font-family:'SF Mono','Courier New',monospace;text-align:center;letter-spacing:-1px;line-height:1;padding:4px 0 4px;transition:color .4s}
.tmr-phase-lbl{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;text-align:center;color:var(--text2);margin-bottom:3px}
.tmr-phase-name{font-size:22px;font-weight:900;letter-spacing:1px;text-align:center;margin-bottom:10px;transition:color .4s}
.tmr-pips{display:flex;gap:6px;justify-content:center;margin:12px 0 14px}
.tmr-pip{width:32px;height:6px;border-radius:3px;background:var(--surf4);transition:background .3s,box-shadow .3s}
.tmr-pip.on{background:var(--gold)}
.tmr-pip.cur{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.tmr-hub-row{display:flex;gap:10px;margin:4px 0 10px}
.tmr-hub{flex:1;border-radius:var(--r-sm);padding:12px 8px;text-align:center;border:2px solid transparent;transition:background .3s,border-color .3s}
.tmr-hub-lbl{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
.tmr-hub-state{font-size:13px;font-weight:700}
.tmr-hub.active{border-color:var(--green);background:rgba(76,175,125,.12)}
.tmr-hub.inactive{border-color:var(--surf4);background:rgba(30,30,40,.4);opacity:.5}
@keyframes tmr-hub-warn{0%,100%{opacity:1}50%{opacity:.15}}
.tmr-hub.warning{animation:tmr-hub-warn .33s ease-in-out infinite}
@keyframes tmr-end-pulse{0%,100%{opacity:1}50%{opacity:.5}}
.tmr-endgame{animation:tmr-end-pulse 1s ease-in-out infinite}
.tmr-ctrl-row{display:flex;gap:10px;margin-top:10px}
.tmr-ctrl-btn{flex:1;padding:15px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.tmr-ctrl-btn:active{opacity:.7}
@keyframes tmr-flash{0%{background:rgba(255,255,255,.25)}100%{background:transparent}}
.tmr-over{position:absolute;inset:0;background:rgba(11,11,22,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;border-radius:var(--r)}
/* Hub halo — full-screen edge glow on sc-timer */
#tmr-halo{position:fixed;inset:0;pointer-events:none;z-index:997;transition:box-shadow .6s ease,opacity .6s ease;border-radius:0}
#tmr-halo-left,#tmr-halo-right{position:fixed;top:0;bottom:0;width:50%;pointer-events:none;z-index:997;transition:box-shadow .6s ease}
#tmr-halo-left{left:0}
#tmr-halo-right{right:0}
@keyframes tmr-halo-warn{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes tmr-halo-end{0%,100%{box-shadow:inset 0 0 80px 30px var(--tmr-halo-c,transparent)}50%{box-shadow:inset 0 0 130px 55px var(--tmr-halo-c,transparent)}}
@keyframes tmr-halo-chase{0%{box-shadow:inset 0 0 70px 30px rgba(255,255,255,.5)}25%{box-shadow:inset 0 0 100px 45px rgba(255,255,255,.65)}50%{box-shadow:inset 0 0 70px 30px rgba(255,255,255,.35)}75%{box-shadow:inset 0 0 100px 45px rgba(255,255,255,.65)}100%{box-shadow:inset 0 0 70px 30px rgba(255,255,255,.5)}}
.tmr-hub.transition-chase{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.12);animation:tmr-hub-chase 1.2s linear infinite}
@keyframes tmr-hub-chase{0%,100%{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}50%{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.18)}}
/* Net status dot */
.tmr-net-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.tmr-net-dot.on{background:var(--green)}
.tmr-net-dot.off{background:var(--text3)}
.tmr-net-dot.err{background:var(--red)}
/* Countdown overlay */
#tmr-countdown{position:fixed;inset:0;background:rgba(11,11,22,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9990;gap:10px}
#tmr-countdown-num{font-size:140px;font-weight:900;font-family:'SF Mono','Courier New',monospace;line-height:1;transition:transform .1s}
/* Auto winner modal */
#tmr-winner-modal{position:fixed;inset:0;background:rgba(11,11,22,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9980;gap:14px;padding:24px}
/* Host badge */
.tmr-host-badge{display:inline-block;background:var(--gold);color:#000;font-size:10px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle}
/* Custom volume slider — matches ctr-slider pattern */
.tmr-vol-range{-webkit-appearance:none;appearance:none;width:100%;height:8px;background:var(--surf4);border-radius:4px;outline:none;cursor:pointer;touch-action:manipulation;display:block}
.tmr-vol-range::-webkit-slider-runnable-track{height:8px;background:var(--surf4);border-radius:4px}
.tmr-vol-range::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--gold);margin-top:-10px;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.tmr-vol-range::-moz-range-track{height:8px;background:var(--surf4);border-radius:4px}
.tmr-vol-range::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--gold);border:none;box-shadow:0 2px 8px rgba(0,0,0,.5)}
</style>
</style>
</head>
<body>

<!-- ═══════════════ SETUP ═══════════════ -->
<div class="screen active" id="sc-setup">
  <div class="hdr">
    <div class="hdr-mid">
      <div class="hdr-title">Match Timer</div>
      <div class="hdr-sub">REBUILT 2026</div>
    </div>
  </div>
  <div class="body">
    <div style="max-width:420px;margin:0 auto">

      <div class="card">
        <div class="card-hd">HOST MODE</div>
        <div class="trow" onclick="setupToggleHost(this)" style="padding:10px 0;border-bottom:none">
          <div>
            <div class="trow-lbl">Event Host</div>
            <div class="trow-sub" id="setup-host-sub">PA-connected device — controls match start</div>
          </div>
          <div id="setup-host-tog" class="tog"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-hd">ROOM CODE</div>
        <input id="setup-room" type="text" inputmode="text" autocomplete="off" autocorrect="off"
          autocapitalize="characters" spellcheck="false"
          placeholder="e.g. 2026WASNO or 3310"
          style="text-transform:uppercase;letter-spacing:1px;font-size:20px;font-weight:800;text-align:center"
          oninput="this.value=this.value.replace(/[^a-zA-Z0-9_-]/g,'').toUpperCase()">
        <div style="font-size:11px;color:var(--text2);margin-top:8px;text-align:center">All devices on the same field enter the same code</div>
      </div>

      <button class="btn btn-gold" onclick="setupGo()" style="font-size:18px;padding:18px;margin-top:4px">
        ▶  Open Timer
      </button>

    </div>
  </div>
</div>

<!-- ═══════════════ MATCH TIMER ═══════════════ -->
<div class="screen" id="sc-timer">
  <div class="hdr">
    <button class="hdr-btn" onclick="timerGoHome()">‹ Home</button>
    <div class="hdr-mid">
      <div class="hdr-title">Match Timer</div>
      <div class="hdr-sub">REBUILT 2026</div>
    </div>
    <button class="hdr-btn" onclick="timerReset()" id="tmr-reset-btn" style="visibility:hidden">Reset</button>
  </div>
  <div class="body" id="tmr-body" style="position:relative"></div>
</div>

<!-- Floating sync indicator — appears on all screens when sync is active -->
<div id="sync-indicator" style="position:fixed;top:calc(11px + env(safe-area-inset-top,0px));right:calc(14px + env(safe-area-inset-right,0px));z-index:500;display:none;align-items:center;gap:4px;pointer-events:none">
  <span id="sync-count-badge" style="font-size:10px;font-weight:800;color:var(--text2);display:none"></span>
  <span class="sync-dot off" id="sync-dot-main"></span>
</div>

<!-- Hub halo overlay — visible only on sc-timer -->
<div id="tmr-halo" style="display:none"></div>
<div id="tmr-halo-left" style="display:none"></div>
<div id="tmr-halo-right" style="display:none"></div>

<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>

/* ─── SETUP SCREEN ─── */
function setupToggleHost(row) {
  var isHost = localStorage.getItem('tmr_is_host') === '1';
  isHost = !isHost;
  localStorage.setItem('tmr_is_host', isHost ? '1' : '0');
  var tog = document.getElementById('setup-host-tog');
  if (tog) { tog.className = 'tog' + (isHost ? ' on' : ''); }
  var sub = document.getElementById('setup-host-sub');
  if (sub) sub.textContent = isHost
    ? 'PA-connected device — controls match start'
    : 'Listening for host — syncs automatically';
}

function setupGo() {
  var room = (document.getElementById('setup-room').value || '').replace(/[^a-zA-Z0-9_-]/g, '');
  if (!room) { toast('⚠️ Enter a room code first'); return; }
  localStorage.setItem('tmr_room', room.toLowerCase());
  openTimer();
}

// Init setup screen state from localStorage
(function() {
  var isHost = localStorage.getItem('tmr_is_host') === '1';
  var room = localStorage.getItem('tmr_room') || '';
  var tog = document.getElementById('setup-host-tog');
  if (tog && isHost) tog.className = 'tog on';
  var inp = document.getElementById('setup-room');
  if (inp && room) inp.value = room.toUpperCase();
})();

/* ─── NAVIGATION ─── */
function goTo(id) {
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.remove('active');
  });
  var el = document.getElementById(id);
  if (el) el.classList.add('active');
}

/* ─── TOAST ─── */
var _toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('on'); }, 3000);
}

var TMR_SFX = {};
function tmrLoadAudio() {
  Object.keys(TMR_AUDIO_B64).forEach(function(n) {
    var a = new Audio(TMR_AUDIO_B64[n]);
    a.preload = 'auto';
    TMR_SFX[n] = a;
  });
}
var TMR_ACTX=null;
function tmrGetAudioCtx(){
  if(!TMR_ACTX){try{TMR_ACTX=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(TMR_ACTX&&TMR_ACTX.state==='suspended')TMR_ACTX.resume().catch(function(){});
  return TMR_ACTX;
}
function tmrPlay(name) {
  if(!TMR_SFX[name]) return;
  var a;
  try { a = TMR_SFX[name].cloneNode(true); } catch(e) { a = new Audio(TMR_AUDIO_B64[name]); }
  var ctx=tmrGetAudioCtx();
  if(ctx&&TMR.gain>1){
    a.volume=1;
    try{
      var src=ctx.createMediaElementSource(a);
      var g=ctx.createGain();
      g.gain.value=Math.min(5,TMR.vol*TMR.gain);
      src.connect(g);g.connect(ctx.destination);
    }catch(e){a.volume=Math.min(1,TMR.vol);}
  } else {
    a.volume=Math.max(0,Math.min(1,TMR.vol));
  }
  a.play().catch(function(){});
}
function tmrSetMaster(v) {
  var pct=parseInt(v)||0;
  // 0-100 = normal volume (gain=1), 101-500 = boosted (gain up to 5x)
  if(pct<=100){TMR.vol=pct/100;TMR.gain=1;}
  else{TMR.vol=1;TMR.gain=pct/100;}
  var sp=document.getElementById('tmr-vol-pct');
  if(sp) sp.textContent=pct+'%';
  var sl=document.getElementById('tmr-vol-slider');
  if(sl) sl.value=pct;
}

function tmrToggleHost(el) {
  var isHost = localStorage.getItem('tmr_is_host')==='1';
  isHost = !isHost;
  localStorage.setItem('tmr_is_host', isHost ? '1' : '0');
  // Update toggle UI inline
  el.style.background = isHost ? 'var(--gold)' : 'var(--surf4)';
  var knob = el.querySelector('div');
  if(knob) knob.style.left = isHost ? '23px' : '3px';
  toast(isHost ? '🎙 Host mode ON — you control the match' : '📡 Host mode OFF — listening for host');
}

var TMR = {
  ally:'', wonAuto:'', vol:1.0, gain:2.5,
  running:false, paused:false,
  _startMs:0, elapsed:0, elapsedAtPause:0, startWall:0,
  tickRaf:0, _lastPhaseIdx:-1, _lastSyncSent:0
};
var TMR_PHASES = [
  {n:'AUTO',       d:20, pause:false},
  {n:'PAUSE',      d:3,  pause:true },
  {n:'TRANSITION', d:10, pause:false},
  {n:'SHIFT 1',    d:25, pause:false},
  {n:'SHIFT 2',    d:25, pause:false},
  {n:'SHIFT 3',    d:25, pause:false},
  {n:'SHIFT 4',    d:25, pause:false},
  {n:'END GAME',   d:30, pause:false}
];
var TMR_TOTAL = 163;
var TMR_VIS = ['AUTO','TRANSITION','SHIFT 1','SHIFT 2','SHIFT 3','SHIFT 4','END GAME'];
var TMR_PHASE_STARTS = (function(){
  var a=[],t=0;
  TMR_PHASES.forEach(function(p){a.push(t);t+=p.d;});
  return a; // [0,20,23,33,58,83,108,133]
})();

function tmrPhaseAt(e) {
  var t=e;
  for(var i=0;i<TMR_PHASES.length;i++){
    if(t<TMR_PHASES[i].d||i===TMR_PHASES.length-1)
      return{idx:i,rem:Math.max(0,TMR_PHASES[i].d-t)};
    t-=TMR_PHASES[i].d;
  }
  return{idx:TMR_PHASES.length-1,rem:0};
}

/* ─── PEERJS P2P NETWORKING (WebRTC — direct device-to-device) ─── */
var TMR_NET = {
  peer: null, conns: [], connected: false,
  room: '', _retry: null, _peerOpen: false
};

function tmrNetRoom() {
  return (localStorage.getItem('tmr_room')||localStorage.getItem('bh3310_event_code')||'hawkeye3310')
    .replace(/[^a-zA-Z0-9_-]/g,'').substring(0,20)||'hawkeye3310';
}
function tmrNetIsHost() { return localStorage.getItem('tmr_is_host')==='1'; }

function tmrNetDestroy() {
  clearTimeout(TMR_NET._retry);
  TMR_NET.conns.forEach(function(c){ try{c.close();}catch(e){} });
  TMR_NET.conns = [];
  if(TMR_NET.peer){ try{TMR_NET.peer.destroy();}catch(e){} TMR_NET.peer=null; }
  TMR_NET.connected = false;
  TMR_NET._peerOpen = false;
}

function tmrNetConnect() {
  if(TMR_NET.peer && !TMR_NET.peer.destroyed) return;
  clearTimeout(TMR_NET._retry);
  if(typeof Peer === 'undefined'){ toast('⚠️ P2P library loading…'); TMR_NET._retry=setTimeout(tmrNetConnect,2000); return; }

  TMR_NET.room = tmrNetRoom();
  var hostId = 'hawkeye-' + TMR_NET.room + '-host';
  var isHost = tmrNetIsHost();

  if(isHost) {
    /* ── HOST: register with known peer ID, accept client connections ── */
    var peer;
    try { peer = new Peer(hostId); } catch(e){ toast('⚠️ P2P init failed'); return; }
    TMR_NET.peer = peer;

    peer.on('open', function() {
      TMR_NET._peerOpen = true;
      TMR_NET.connected = true;
      tmrUpdateNetDot();
    });

    peer.on('connection', function(conn) {
      conn.on('open', function() {
        TMR_NET.conns.push(conn);
        tmrUpdateNetDot();
        toast('👥 Device joined (' + TMR_NET.conns.length + ')');
        // Send current timer state so late joiners sync up
        if(TMR.running || TMR.paused) {
          try{ conn.send(JSON.stringify({t:'full_state', running:TMR.running, paused:TMR.paused, startMs:TMR._startMs, wonAuto:TMR.wonAuto, elapsed:TMR.elapsed})); }catch(e){}
        }
      });
      conn.on('close', function() {
        TMR_NET.conns = TMR_NET.conns.filter(function(c){return c!==conn;});
        tmrUpdateNetDot();
      });
      conn.on('error', function(){});
    });

    peer.on('error', function(err) {
      if(err.type === 'unavailable-id') {
        toast('⚠️ Room ' + TMR_NET.room + ' already has a host');
      }
      TMR_NET.connected = false;
      tmrUpdateNetDot();
    });

    peer.on('disconnected', function() {
      TMR_NET.connected = false;
      tmrUpdateNetDot();
      if(TMR_NET.peer && !TMR_NET.peer.destroyed) {
        TMR_NET._retry = setTimeout(function(){ try{TMR_NET.peer.reconnect();}catch(e){} }, 3000);
      }
    });

  } else {
    /* ── CLIENT: connect to host's known peer ID ── */
    var peer;
    try { peer = new Peer(); } catch(e){ toast('⚠️ P2P init failed'); return; }
    TMR_NET.peer = peer;

    peer.on('open', function() {
      TMR_NET._peerOpen = true;
      var conn = peer.connect(hostId, {reliable:true, serialization:'json'});
      conn.on('open', function() {
        TMR_NET.conns = [conn];
        TMR_NET.connected = true;
        tmrUpdateNetDot();
        toast('📡 Synced to host · Room: ' + TMR_NET.room);
      });
      conn.on('data', function(raw) {
        try {
          var d = (typeof raw==='string') ? JSON.parse(raw) : raw;
          tmrNetHandle(d);
        } catch(e){}
      });
      conn.on('close', function() {
        TMR_NET.conns = [];
        TMR_NET.connected = false;
        tmrUpdateNetDot();
        // Retry connection to host
        TMR_NET._retry = setTimeout(function(){ tmrNetDestroy(); tmrNetConnect(); }, 4000);
      });
      conn.on('error', function(){});
    });

    peer.on('error', function(err) {
      if(err.type === 'peer-unavailable') {
        toast('⏳ Waiting for host on room ' + TMR_NET.room + '…');
      }
      TMR_NET.connected = false;
      tmrUpdateNetDot();
      TMR_NET._retry = setTimeout(function(){ tmrNetDestroy(); tmrNetConnect(); }, 5000);
    });
  }
}

function tmrNetPublish(obj) {
  if(!TMR_NET.conns.length) return false;
  var msg = JSON.stringify(obj);
  TMR_NET.conns.forEach(function(c){ if(c.open){ try{c.send(msg);}catch(e){} } });
  return true;
}

function tmrNetHandle(d) {
  // Both host and client process these
  switch(d.t){
    case 'full_state':
      // Late-joiner sync — host sends current state when a client connects
      if(!tmrNetIsHost()){
        TMR._startMs = d.startMs||0;
        TMR.wonAuto = d.wonAuto||'';
        TMR._lastPhaseIdx = -1;
        if(d.running && !d.paused && TMR._startMs) {
          TMR.running=true; TMR.paused=false;
          TMR.elapsed = (Date.now()-TMR._startMs)/1000;
          var rb=document.getElementById('tmr-reset-btn'); if(rb)rb.style.visibility='visible';
          renderTimerActive(); timerTick();
        } else if(d.paused && TMR._startMs) {
          TMR.running=false; TMR.paused=true;
          TMR.elapsed = d.elapsed||0;
          TMR.elapsedAtPause = TMR.elapsed;
          renderTimerActive(); timerUpdateDisplay();
        }
      }
      break;
    case 'start_in':
      TMR._startMs = d.startMs;
      TMR.ally = TMR.ally || d.hostAlly || ''; // keep local ally
      TMR.wonAuto = '';
      TMR._lastPhaseIdx = -1;
      // Show countdown for non-hosts (host already shows it)
      if(!tmrNetIsHost()) { tmrShowCountdownTo(d.startMs); }
      break;
    case 'sync':
      // Drift correction for clients only
      if(!tmrNetIsHost()&&TMR.running&&!TMR.paused&&TMR._startMs){
        var serverElapsed = (Date.now()-TMR._startMs)/1000;
        var myElapsed = TMR.elapsed;
        if(Math.abs(myElapsed-serverElapsed)>2) {
          TMR._startMs = Date.now()-d.e*1000;
        }
      }
      break;
    case 'pause':
      if(!tmrNetIsHost()){
        TMR.paused=true;
        cancelAnimationFrame(TMR.tickRaf);
        var pb=document.getElementById('tmr-pause-btn');
        if(pb) pb.textContent='▶  Resume';
      }
      break;
    case 'resume':
      if(!tmrNetIsHost()){
        TMR._startMs=Date.now()-d.e*1000;
        TMR.paused=false;TMR.running=true;
        timerTick();
        var pb=document.getElementById('tmr-pause-btn');
        if(pb) pb.textContent='⏸  Pause';
      }
      break;
    case 'winner':
      TMR.wonAuto=d.w;
      var wm=document.getElementById('tmr-winner-modal');
      if(wm) wm.remove();
      toast('🏆 Auto winner: '+(d.w==='neither'?'Tie/NA':d.w.toUpperCase()));
      break;
    case 'reset':
      if(!tmrNetIsHost()){
        timerStop(); TMR.elapsed=0; TMR.paused=false; TMR._startMs=0;
        var h=document.getElementById('tmr-halo');if(h)h.style.display='none';
        renderTimerPre();
      }
      break;
  }
}

/* ─── COUNTDOWN OVERLAY ─── */
function tmrShowCountdownTo(startMs) {
  // Remove any existing
  var old=document.getElementById('tmr-countdown');
  if(old) old.remove();

  var overlay=document.createElement('div');
  overlay.id='tmr-countdown';
  var body=document.getElementById('tmr-body');
  if(!body)return;

  overlay.innerHTML=
    '<div style="font-size:14px;font-weight:800;letter-spacing:2px;color:var(--text2)">MATCH STARTS IN</div>'
    +'<div id="tmr-countdown-num" class="tmr-clock" style="font-size:140px;color:var(--gold)">5</div>';
  body.parentElement.appendChild(overlay);

  // Swap in the timer body immediately
  renderTimerActive();

  var interval=setInterval(function(){
    var rem=Math.ceil((startMs-Date.now())/1000);
    var numEl=document.getElementById('tmr-countdown-num');
    var cnt=document.getElementById('tmr-countdown');
    if(!cnt){clearInterval(interval);return;}
    if(rem<=0){
      clearInterval(interval);
      cnt.remove();
      // Actually start the timer
      TMR.running=true; TMR.paused=false;
      TMR._startMs=startMs;
      TMR._lastPhaseIdx=-1;
      var rb=document.getElementById('tmr-reset-btn');
      if(rb) rb.style.visibility='visible';
      if(tmrNetIsHost()){
        tmrPlay('cavalrycharge'); // match start horn
      }
      timerTick();
      return;
    }
    if(numEl) numEl.textContent=rem;
  },500);
}

/* ─── HOST: INSTANT START ─── */
function timerInstantStart() {
  if(!tmrNetIsHost()&&!TMR.ally){toast('⚠️ Pick your alliance first');return;}
  if(tmrNetIsHost()&&(!TMR.ally||TMR.ally==='both')) TMR.ally='host';
  var sm=Date.now()+200; // tiny buffer for network
  TMR._startMs=sm;
  if(TMR_NET.connected) tmrNetPublish({t:'start_in',startMs:sm,hostAlly:TMR.ally});
  // Skip countdown overlay — go straight to timer
  TMR.running=true; TMR.paused=false;
  TMR._lastPhaseIdx=-1;
  var rb=document.getElementById('tmr-reset-btn');
  if(rb) rb.style.visibility='visible';
  if(tmrNetIsHost()) tmrPlay('cavalrycharge');
  renderTimerActive();
  timerTick();
}

/* ─── HOST: BEGIN COUNTDOWN ─── */
function timerBeginCountdown() {
  if(!tmrNetIsHost()&&!TMR.ally){toast('⚠️ Pick your alliance first');return;}
  // Host: default to 'both' split-screen if no specific side picked
  if(tmrNetIsHost()&&(!TMR.ally||TMR.ally==='both')) TMR.ally='host';
  // Host picked a specific side — keep it as-is for single halo
  if(!TMR_NET.connected){
    // Offline mode — just countdown locally
    var sm=Date.now()+5500;
    TMR._startMs=sm;
    tmrShowCountdownTo(sm);
    return;
  }
  var sm=Date.now()+5500;
  TMR._startMs=sm;
  tmrNetPublish({t:'start_in',startMs:sm,hostAlly:TMR.ally});
  tmrShowCountdownTo(sm);
}

function timerTick() {
  if(!TMR.running||TMR.paused)return;
  if(TMR._startMs){
    TMR.elapsed=(Date.now()-TMR._startMs)/1000;
  } else {
    TMR.elapsed=TMR.elapsedAtPause+(performance.now()-TMR.startWall)/1000;
  }
  if(TMR.elapsed<0)TMR.elapsed=0;
  if(TMR.elapsed>=TMR_TOTAL){
    TMR.elapsed=TMR_TOTAL;
    timerUpdateDisplay();
    timerStop();
    // Match end buzzer is handled by offset system
    if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
    setTimeout(timerShowOver,1800);
    return;
  }
  // Periodic sync broadcast from host
  if(tmrNetIsHost()&&(Date.now()-TMR._lastSyncSent>4000)){
    TMR._lastSyncSent=Date.now();
    tmrNetPublish({t:'sync',e:TMR.elapsed});
  }
  timerUpdateDisplay();
  TMR.tickRaf=requestAnimationFrame(timerTick);
}

function timerTogglePause() {
  if(!tmrNetIsHost())return;
  if(TMR.paused){
    if(TMR._startMs) TMR._startMs=Date.now()-TMR.elapsedAtPause*1000;
    else TMR.startWall=performance.now();
    TMR.paused=false;TMR.running=true;
    tmrNetPublish({t:'resume',e:TMR.elapsed});
    timerTick();
  } else {
    TMR.elapsedAtPause=TMR.elapsed;
    TMR.paused=true;
    cancelAnimationFrame(TMR.tickRaf);
    tmrNetPublish({t:'pause',e:TMR.elapsed});
  }
  var btn=document.getElementById('tmr-pause-btn');
  if(btn)btn.textContent=TMR.paused?'▶  Resume':'⏸  Pause';
}

/* ─── HUB STATE ─── */
function tmrHubState(elapsed){
  var ph=tmrPhaseAt(elapsed);
  var pn=TMR_PHASES[ph.idx].n;
  var w=(TMR.wonAuto&&TMR.wonAuto!=='neither')?TMR.wonAuto:null;
  // Default: both active
  var ra=true,ba=true;
  // Transition: white chase on winner hub (special state)
  var transWinner=false,transLoser=false;
  // Winner inactive Shifts 1&3; Loser inactive Shifts 2&4
  if(w){
    if(pn==='SHIFT 1'||pn==='SHIFT 3'){if(w==='red')ra=false;else ba=false;}
    if(pn==='SHIFT 2'||pn==='SHIFT 4'){if(w==='red')ba=false;else ra=false;}
    if(pn==='TRANSITION'){transWinner=true;}
  }
  // Warning 3s before ANY hub deactivation
  // Shift1 start: winner goes inactive. Shift2 start: loser goes inactive.
  // Shift3 start: winner goes inactive. Shift4 start: loser goes inactive.
  var s1=TMR_PHASE_STARTS[3],s2=TMR_PHASE_STARTS[4],s3=TMR_PHASE_STARTS[5],s4=TMR_PHASE_STARTS[6];
  var warnWinner=w&&((elapsed>=s1-3&&elapsed<s1)||(elapsed>=s3-3&&elapsed<s3));
  var warnLoser=w&&((elapsed>=s2-3&&elapsed<s2)||(elapsed>=s4-3&&elapsed<s4));
  var warnRed=false,warnBlue=false;
  if(w==='red'){warnRed=warnWinner;warnBlue=warnLoser;}
  else if(w==='blue'){warnBlue=warnWinner;warnRed=warnLoser;}
  return{redActive:ra,blueActive:ba,warnRed:warnRed,warnBlue:warnBlue,
    transWinner:transWinner,winner:w,phaseName:pn};
}

function tmrFmt(sec){
  var s=Math.ceil(sec);if(s<0)s=0;
  return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);
}

/* ─── UPDATE DISPLAY ─── */
function timerUpdateDisplay(){
  var elapsed=TMR.elapsed;
  var ph=tmrPhaseAt(elapsed);
  var pn=TMR_PHASES[ph.idx].n;
  var isPause=TMR_PHASES[ph.idx].pause;

  // Phase label/name
  var lbl=document.getElementById('tmr-phase-lbl');
  var nameEl=document.getElementById('tmr-phase-name');
  if(lbl) lbl.textContent=isPause?'FIELD RESET':'PHASE';
  if(nameEl){
    nameEl.textContent=isPause?'AUTO END':pn;
    nameEl.className='tmr-phase-name'+(pn==='END GAME'?' tmr-endgame':'');
  }

  // Game clock (full match countdown — visible only after teleop starts)
  var gw=document.getElementById('tmr-game-wrap');
  var gc=document.getElementById('tmr-game-clock');
  var teleopStarted=(elapsed>=TMR_PHASE_STARTS[3]); // Shift 1 start = teleop
  if(gw) gw.style.display=teleopStarted?'block':'none';
  if(gc&&teleopStarted){
    var gameRem=Math.max(0,TMR_TOTAL-elapsed);
    gc.textContent=tmrFmt(gameRem);
    if(gameRem<=30) gc.style.color=TMR.ally==='red'||TMR.ally==='host'?'var(--red)':'var(--blue)';
    else if(gameRem<=10) gc.style.color='var(--red)';
    else gc.style.color='var(--text)';
  }

  // Phase clock
  var ck=document.getElementById('tmr-clock');
  if(ck){
    ck.textContent=tmrFmt(isPause?0:ph.rem);
    ck.style.color=pn==='AUTO'?'var(--blue)':pn==='END GAME'?(TMR.ally==='red'?'var(--red)':'var(--blue)'):'var(--gold)';
  }

  // Pips
  var vi=TMR_VIS.indexOf(pn);
  for(var i=0;i<7;i++){
    var pip=document.getElementById('tmr-pip-'+i);
    if(!pip)continue;
    pip.className='tmr-pip'+(i<vi?' on':i===vi?' cur':'');
  }

  // Hub state
  var hub=tmrHubState(elapsed);
  var rh=document.getElementById('tmr-hub-red');
  var bh=document.getElementById('tmr-hub-blue');
  var rs=document.getElementById('tmr-hub-red-state');
  var bs=document.getElementById('tmr-hub-blue-state');
  // Hub classes and labels
  function hubClass(active,warn,isTrans,isWinner){
    if(isTrans&&isWinner) return 'tmr-hub transition-chase';
    if(warn) return 'tmr-hub active warning';
    return 'tmr-hub '+(active?'active':'inactive');
  }
  function hubLabel(active,warn,isTrans,isWinner){
    if(isTrans&&isWinner) return '⚪ White Chase';
    if(warn) return '⚠️ Warning';
    return active?'✅ Active':'⛔ Off';
  }
  var isRedWinner=hub.winner==='red',isBlueWinner=hub.winner==='blue';
  if(rh&&rs){rh.className=hubClass(hub.redActive,hub.warnRed,hub.transWinner,isRedWinner);rs.textContent=hubLabel(hub.redActive,hub.warnRed,hub.transWinner,isRedWinner);}
  if(bh&&bs){bh.className=hubClass(hub.blueActive,hub.warnBlue,hub.transWinner,isBlueWinner);bs.textContent=hubLabel(hub.blueActive,hub.warnBlue,hub.transWinner,isBlueWinner);}

  // Halo
  tmrUpdateHalo(hub,pn,isPause,elapsed);

  // Background tint
  var body=document.getElementById('tmr-body');
  if(body)body.style.background=pn==='AUTO'?'rgba(74,143,232,.05)':pn==='END GAME'?(TMR.ally==='red'?'rgba(232,83,74,.06)':'rgba(74,143,232,.06)'):'';

  // Phase change effects (vibration for everyone)
  if(TMR._lastPhaseIdx!==ph.idx){
    var prev=TMR._lastPhaseIdx;
    TMR._lastPhaseIdx=ph.idx;
    if(!isPause&&navigator.vibrate){
      if(pn==='END GAME')navigator.vibrate([100,50,100,50,150]);
      else navigator.vibrate(70);
    }
    // Host: trigger auto winner modal on Transition
    if(pn==='TRANSITION'&&tmrNetIsHost()&&!TMR.wonAuto){
      setTimeout(tmrShowWinnerModal,400);
    }
  }

  // Sound cues (host only) — each sound STARTS when its phase STARTS
  if(tmrNetIsHost()){
    if(!TMR._sfxPlayed)TMR._sfxPlayed={};
    var cues=[
      {k:'auto_end',   snd:'buzzer',     trigger:20},    // buzzer at auto end
      {k:'teleop',     snd:'threebells', trigger:33},    // 3 bells at teleop start (Shift 1)
      {k:'shift2',     snd:'shift',      trigger:58},    // shift sound
      {k:'shift3',     snd:'shift',      trigger:83},
      {k:'shift4',     snd:'shift',      trigger:108},
      {k:'endgame',    snd:'endgame',    trigger:133},   // endgame warning
      {k:'match_end',  snd:'buzzer',     trigger:163}    // buzzer at match end
    ];
    cues.forEach(function(c){
      if(elapsed>=c.trigger&&!TMR._sfxPlayed[c.k]){
        TMR._sfxPlayed[c.k]=true;
        tmrPlay(c.snd);
      }
      if(elapsed<c.trigger)TMR._sfxPlayed[c.k]=false;
    });
  }
}

/* ─── HUB HALO ─── */
function tmrHaloStyle(active,warn,isWinner,transWinner,pn,isPause,rgb){
  if(isPause) return 'box-shadow:none;animation:none';
  if(pn==='END GAME') return 'box-shadow:inset 0 0 100px 50px rgba('+rgb+',.65);animation:tmr-halo-end 0.8s ease-in-out infinite;--tmr-halo-c:rgba('+rgb+',.65)';
  if(transWinner){
    if(isWinner) return 'box-shadow:inset 0 0 90px 40px rgba(255,255,255,.55);animation:tmr-halo-chase 1.2s linear infinite';
    return 'box-shadow:inset 0 0 80px 30px rgba('+rgb+',.5);animation:none';
  }
  if(warn) return 'box-shadow:inset 0 0 90px 40px rgba('+rgb+',.7);animation:tmr-hub-warn .33s ease-in-out infinite';
  if(!active) return 'box-shadow:inset 0 0 60px 20px rgba(30,30,40,.6);animation:none';
  var i=pn==='AUTO'?.55:.45;
  return 'box-shadow:inset 0 0 80px 30px rgba('+rgb+','+i+');animation:none';
}
function tmrUpdateHalo(hub,pn,isPause,elapsed){
  var isHost=tmrNetIsHost();
  var ally=TMR.ally;
  var halo=document.getElementById('tmr-halo');
  var hl=document.getElementById('tmr-halo-left');
  var hr=document.getElementById('tmr-halo-right');
  // Host in split mode ('host'=both)
  if(isHost&&ally==='host'){
    if(halo)halo.style.display='none';
    if(!hl||!hr)return;
    hl.style.display='block';hr.style.display='block';
    var baseL='display:block;position:fixed;top:0;bottom:0;left:0;width:50%;pointer-events:none;z-index:997;border-right:1px solid rgba(255,255,255,.08);';
    var baseR='display:block;position:fixed;top:0;bottom:0;right:0;width:50%;pointer-events:none;z-index:997;border-left:1px solid rgba(255,255,255,.08);';
    var isRedWin=hub.winner==='red',isBlueWin=hub.winner==='blue';
    hl.style.cssText=baseL+tmrHaloStyle(hub.redActive,hub.warnRed,isRedWin,hub.transWinner,pn,isPause,'232,83,74');
    hr.style.cssText=baseR+tmrHaloStyle(hub.blueActive,hub.warnBlue,isBlueWin,hub.transWinner,pn,isPause,'74,143,232');
    return;
  }
  // Single full-screen halo: client OR host who picked a specific side
  if(hl)hl.style.display='none';
  if(hr)hr.style.display='none';
  if(!halo||!ally||ally==='host')return;
  halo.style.display='block';
  var myActive=TMR.ally==='red'?hub.redActive:hub.blueActive;
  var myWarn=TMR.ally==='red'?hub.warnRed:hub.warnBlue;
  var imWinner=(hub.winner===TMR.ally);
  var allyRgb=TMR.ally==='red'?'232,83,74':'74,143,232';
  var base='display:block;position:fixed;inset:0;pointer-events:none;z-index:997;';
  halo.style.cssText=base+tmrHaloStyle(myActive,myWarn,imWinner,hub.transWinner,pn,isPause,allyRgb);
}

/* ─── AUTO WINNER MODAL (host only) ─── */
function tmrShowWinnerModal(){
  if(document.getElementById('tmr-winner-modal'))return;
  var m=document.createElement('div');
  m.id='tmr-winner-modal';
  function btn(w,color,label,id){
    return '<button id="'+id+'" onclick="tmrPickWinner(\''+w+'\')" style="width:100%;padding:16px;border:none;border-radius:var(--r);background:'+color+';color:#fff;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:opacity .3s,transform .3s">'+label+'</button>';
  }
  m.innerHTML=
    '<div style="font-size:14px;font-weight:800;letter-spacing:1.5px;color:var(--text2);margin-bottom:4px">TRANSITION</div>'
    +'<div style="font-size:20px;font-weight:900;margin-bottom:14px">Who won Autonomous?</div>'
    +'<div id="tmr-winner-btns" style="display:flex;flex-direction:column;gap:8px">'
    +btn('red','var(--red)','🔴 Red Alliance','tmr-btn-red')
    +btn('blue','var(--blue)','🔵 Blue Alliance','tmr-btn-blue')
    +btn('random','var(--gold)','🎲 Random','tmr-btn-random')
    +'</div>';
  document.body.appendChild(m);
}

function tmrPickWinner(w){
  // If random, pick red or blue
  if(w==='random') w=Math.random()<0.5?'red':'blue';
  var winner=w;
  // Animate: hide non-winners, highlight winner
  var ids={red:'tmr-btn-red',blue:'tmr-btn-blue',random:'tmr-btn-random'};
  var loserKeys=Object.keys(ids).filter(function(k){return k!==winner;});
  loserKeys.forEach(function(k){
    var el=document.getElementById(ids[k]);
    if(el){el.style.opacity='0';el.style.transform='scale(0.8)';el.style.pointerEvents='none';}
  });
  // Pulse the winner button
  var winEl=document.getElementById(ids[winner]);
  if(winEl){
    winEl.style.transform='scale(1.05)';
    winEl.style.boxShadow='0 0 20px rgba(255,255,255,.4)';
    winEl.style.pointerEvents='none';
  }
  // After 1.5s, commit the pick and dismiss
  setTimeout(function(){
    TMR.wonAuto=winner;
    tmrNetPublish({t:'winner',w:winner});
    TMR._warnPlayed={};
    var m=document.getElementById('tmr-winner-modal');
    if(m)m.remove();
    toast('🏆 Auto bonus → '+winner.toUpperCase());
  },1500);
}

/* ─── MATCH OVER ─── */
function timerShowOver(){
  var body=document.getElementById('tmr-body');
  if(!body)return;
  var halo=document.getElementById('tmr-halo');
  if(halo){halo.style.boxShadow='none';halo.style.animation='none';}
  var hl=document.getElementById('tmr-halo-left');if(hl){hl.style.boxShadow='none';hl.style.animation='none';hl.style.display='none';}
  var hr=document.getElementById('tmr-halo-right');if(hr){hr.style.boxShadow='none';hr.style.animation='none';hr.style.display='none';}
  var over=document.createElement('div');
  over.className='tmr-over';
  over.style.animation='tmr-flash .25s ease 3';
  over.innerHTML=
    '<div style="font-size:52px">🏁</div>'
    +'<div style="font-size:26px;font-weight:900;letter-spacing:1.5px">MATCH OVER</div>'
    +'<button onclick="timerReset()" style="margin-top:12px;padding:16px 44px;background:var(--gold);color:#000;border:none;border-radius:var(--r);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit">▶  New Match</button>';
  body.appendChild(over);
}

  });
